<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Trade PA</title>

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour — amber for browser chrome on Android -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trade PA" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO / sharing -->
    <meta name="description" content="AI-powered admin tool for tradespeople. Scheduling, invoicing, voice notes and more." />
    <meta name="mobile-web-app-capable" content="yes" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #0f0f0f;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #0f0f0f;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Unregister any old service workers, then register fresh
      if ('serviceWorker' in navigator) {
        // First unregister ALL existing service workers
        navigator.serviceWorker.getRegistrations().then(registrations => {
          registrations.forEach(reg => reg.unregister());
        });
        // Then register the new one with no caching of the sw.js file itself
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              // Force immediate update check
              reg.update();
            })
            .catch(err => console.log('SW failed:', err));
        });
      }
    </script>
  </body>
</html>
