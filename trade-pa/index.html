<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SEO — page title and description -->
    <title>Trade PA — The AI admin assistant that runs your business while you run the jobs</title>
    <meta name="description" content="Trade PA is the voice-first, inbox-monitored AI admin assistant built for UK tradespeople. Reads every email 24/7, drafts every action, chases every unpaid invoice — one tap to approve. Quotes, invoices, CIS, certificates, and a business phone, all in one app." />
    <link rel="canonical" href="https://tradespa.co.uk/" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, iMessage, Slack) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://tradespa.co.uk/" />
    <meta property="og:title" content="Trade PA — Your AI admin assistant for UK trades" />
    <meta property="og:description" content="Reads every email 24/7. Drafts every action. Chases every unpaid invoice. Voice-controlled for when you're on the tools. Built for UK tradespeople." />
    <meta property="og:image" content="https://tradespa.co.uk/icon-512.png" />
    <meta property="og:site_name" content="Trade PA" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://tradespa.co.uk/" />
    <meta name="twitter:title" content="Trade PA — Your AI admin assistant for UK trades" />
    <meta name="twitter:description" content="Reads every email 24/7. Drafts every action. Chases every unpaid invoice. Voice-controlled. Built for UK tradespeople." />
    <meta name="twitter:image" content="https://tradespa.co.uk/icon-512.png" />

    <!-- PWA manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme colour — amber for browser chrome on Android -->
    <meta name="theme-color" content="#f59e0b" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Trade PA" />
    <link rel="apple-touch-icon" href="/icon-180.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <meta name="mobile-web-app-capable" content="yes" />

    <!-- JSON-LD: SoftwareApplication schema for Google rich snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Trade PA",
      "description": "AI-powered admin assistant built for UK tradespeople. Voice-first, inbox-monitored. Handles quotes, invoices, jobs, CIS, certificates, payment chasing and a business phone.",
      "url": "https://tradespa.co.uk/",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web, iOS, Android",
      "offers": {
        "@type": "Offer",
        "price": "49",
        "priceCurrency": "GBP",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "49",
          "priceCurrency": "GBP",
          "referenceQuantity": {
            "@type": "QuantitativeValue",
            "value": "1",
            "unitCode": "MON"
          }
        }
      },
      "provider": {
        "@type": "Organization",
        "name": "Trade PA",
        "url": "https://tradespa.co.uk/"
      }
    }
    </script>

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        min-height: 100%;
        background: #0f0f0f;
        overflow-x: hidden;
        -webkit-text-size-adjust: 100%;
      }
      #root {
        width: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        background: #0f0f0f;
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Kill any existing service workers completely
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          regs.forEach(r => r.unregister());
        });
      }
    </script>
  </body>
</html>
